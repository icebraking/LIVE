<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icebraking F1 2026 — Predicted End-of-Season Standings | ICE Braking</title>
  <meta name="description" content="Predicted final 2026 F1 drivers' and constructors' championship standings after the 22nd and final race, generated by the Icebraking deterministic projection model.">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://www.icebraking.com/foneai/probs/index.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Icebraking F1 2026 — Predicted End-of-Season Standings | ICE Braking">
  <meta property="og:description" content="Predicted final 2026 F1 drivers' and constructors' standings from the Icebraking projection model.">
  <meta property="og:url" content="https://www.icebraking.com/foneai/probs/index.html">
  <meta property="og:image" content="https://www.icebraking.com/favicon.png">
  <meta name="twitter:card" content="summary">
  <link rel="icon" type="image/png" href="../../favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="../../theme.css">
  <style>
    :root { --header-h: 0px; }   /* no AdSense band — banner sits at top */
    .banner { font-size:clamp(1.36rem, 3.1vw, 2.16rem) !important; }

    .ib-wrap { position:absolute; top:var(--banner-h); left:0; right:0; bottom:0; display:flex; flex-direction:column; padding:16px clamp(64px,6vw,84px) 22px; box-sizing:border-box; }
    .ib-tabs { position:relative; display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:10px; flex:0 0 auto; }
    .ib-logic { position:absolute; right:0; left:auto; top:50%; transform:translateY(-50%); text-decoration:none; }

    a.home-button { position:fixed !important; left:18px !important; bottom:18px !important; top:auto !important; right:auto !important; }
    @media (max-width:640px){
      .ib-wrap { padding:12px 14px 80px; }
      a.home-button { left:14px !important; bottom:14px !important; top:auto !important; right:auto !important; }
      .ib-logic { position:static; transform:none; margin-left:auto; }
      .ib-tabs { flex-wrap:wrap; }
    }

    .ib-note { font-family:var(--font-body); font-size:0.82rem; color:var(--ink-mute); margin:0 0 12px; flex:0 0 auto; }
    .ib-scroll { flex:1 1 auto; overflow-y:auto; overflow-x:auto; border:1px solid var(--line); border-radius:12px; background:var(--surface); scrollbar-width:thin; scrollbar-color:rgba(15,118,110,0.5) transparent; }
    .ib-scroll::-webkit-scrollbar { width:10px; height:10px; }
    .ib-scroll::-webkit-scrollbar-thumb { background:rgba(15,118,110,0.4); border-radius:6px; }

    .ib-table { width:100%; border-collapse:collapse; font-family:var(--font-body); }
    .ib-table th, .ib-table td { padding:11px 16px; text-align:center; border-bottom:1px solid var(--line); white-space:nowrap; }
    .ib-table th { position:sticky; top:0; z-index:3; background:#eaf3f1; color:#0e3b37 !important; font-family:var(--font-head) !important; letter-spacing:0.4px; font-weight:600; }
    .ib-table td { color:var(--ink); }
    .ib-table .ib-left { text-align:left; }
    .ib-table .ib-pos { color:var(--ink-mute); font-variant-numeric:tabular-nums; }
    .ib-table .ib-name { font-weight:600; color:var(--head); }
    .ib-table .ib-pts { font-weight:600; color:var(--head); font-variant-numeric:tabular-nums; }
    .ib-table .ib-num { font-variant-numeric:tabular-nums; }
    .ib-table .ib-mute { color:var(--ink-mute); }
    .ib-table tbody tr:hover { background:rgba(15,118,110,0.05); }
    .ib-table tbody tr:first-child td { background:rgba(15,118,110,0.045); }
    .ib-dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:9px; vertical-align:middle; box-shadow:0 0 0 1px rgba(20,24,33,0.12) inset; }

    .ib-loading { padding:40px; text-align:center; color:var(--ink-mute); font-family:var(--font-body); }
    .hidden { display:none !important; }
  </style>
</head>

<body class="page-data">
  <h1 class="banner">ICEBRAKING 2026 — PREDICTED FINAL TABLE</h1>

  <div class="ib-wrap">
    <div class="ib-tabs">
      <a class="tab-btn ib-logic" href="logic.html" title="The mathematics behind the prediction">LOGIC</a>
      <button class="tab-btn active" data-tab="drivers" type="button">DRIVERS</button>
      <button class="tab-btn" data-tab="constructors" type="button">CONSTRUCTORS</button>
    </div>
    <p class="ib-note" id="ib-note">Loading the latest race results…</p>
    <div class="ib-scroll">
      <div id="ib-drivers"><div class="ib-loading">Fetching the latest 2026 results…</div></div>
      <div id="ib-constructors" class="hidden"></div>
    </div>
  </div>

  <a class="home-button" href="../index.html" aria-label="Back" title="Back">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
    </svg>
  </a>

  <script src="predict-seed.js"></script>
  <script src="ib-predict.js"></script>
  <script>
    (function () {
      // Team colours (subtle accent dots)
      var COLOR = {
        'Mercedes':'#27F4D2','Ferrari':'#E8002D','McLaren':'#FF8000','Red Bull':'#3671C6',
        'Alpine':'#0093CC','Racing Bulls':'#6692FF','Haas':'#B6BABD','Williams':'#64C4FF',
        'Audi':'#52E252','Aston Martin':'#229971','Cadillac':'#000000'
      };
      function dot(team){ return '<span class="ib-dot" style="background:'+(COLOR[team]||'#999')+'"></span>'; }

      var driversEl = document.getElementById('ib-drivers');
      var constructorsEl = document.getElementById('ib-constructors');
      var noteEl = document.getElementById('ib-note');

      // tab switching (works during/after load)
      var btns = document.querySelectorAll('.ib-tabs .tab-btn[data-tab]');
      btns.forEach(function (b) {
        b.addEventListener('click', function () {
          btns.forEach(function (x) { x.classList.remove('active'); });
          b.classList.add('active');
          var tab = b.getAttribute('data-tab');
          driversEl.classList.toggle('hidden', tab !== 'drivers');
          constructorsEl.classList.toggle('hidden', tab !== 'constructors');
        });
      });

      function driversHTML(data) {
        var h = '<table class="ib-table"><thead><tr>'
          + '<th>Pos</th><th class="ib-left">Driver</th><th class="ib-left">Team</th>'
          + '<th>Current</th><th>Proj. Remaining</th><th>Predicted Final</th>'
          + '</tr></thead><tbody>';
        data.drivers.forEach(function (d) {
          h += '<tr>'
            + '<td class="ib-pos">' + d.pos + '</td>'
            + '<td class="ib-left ib-name">' + d.name + '</td>'
            + '<td class="ib-left ib-mute">' + dot(d.team) + d.team + '</td>'
            + '<td class="ib-num">' + d.current + '</td>'
            + '<td class="ib-num ib-mute">' + d.proj.toFixed(1) + '</td>'
            + '<td class="ib-pts">' + d.final + '</td>'
            + '</tr>';
        });
        return h + '</tbody></table>';
      }

      function constructorsHTML(data) {
        var h = '<table class="ib-table"><thead><tr>'
          + '<th>Pos</th><th class="ib-left">Constructor</th><th>Current</th>'
          + '<th>Predicted Final</th>'
          + '</tr></thead><tbody>';
        data.constructors.forEach(function (c) {
          h += '<tr>'
            + '<td class="ib-pos">' + c.pos + '</td>'
            + '<td class="ib-left ib-name">' + dot(c.team) + c.team + '</td>'
            + '<td class="ib-num">' + c.current + '</td>'
            + '<td class="ib-pts">' + c.final + '</td>'
            + '</tr>';
        });
        return h + '</tbody></table>';
      }

      function esc(s) { return String(s == null ? '' : s).replace(/[&<>]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]; }); }
      function noteHTML(data) {
        var base = 'Predicted end-of-season standings using <em>Icebraking Projection Model</em>. Model recalibrates dynamically after every race weekend.— Navigate to the Logic tab to examine the underlying logic of this model.';
        if (data.lastRound) {
          var rn = data.lastRaceName ? (' — ' + esc(data.lastRaceName)) : '';
          base = 'Projection after Round ' + data.lastRound + rn + '. ' + base;
        }
        return base;
      }

      function render(data) {
        driversEl.innerHTML = driversHTML(data);
        constructorsEl.innerHTML = constructorsHTML(data);
        noteEl.innerHTML = noteHTML(data);
      }

      // build() always resolves (it falls back to the stored snapshot internally),
      // so the page only ever shows the table — never an error message.
      IBP.build().then(render).catch(function () {
        try {
          var d = IBP.projectSeed();
          d.lastRound = (window.IB_SEED && IB_SEED.STATE.racesDone) || 7;
          render(d);
        } catch (e) {}
      });
    })();
  </script>
</body>

</html>
